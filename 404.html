<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Redirecting...</title>
<script>
  const path = window.location.pathname;
  if (path.startsWith('/tph-link/')) {
    const newUrl = '/tph-link/index.html' + path;
    window.location.replace(newUrl);
  } else {
    window.location.replace('/');
  }
</script>
</head>
<body>Loading...</body>
</html>
